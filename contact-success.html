<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <!-- FOUC prevention: tema y lang antes del paint -->
  <script>
    (function(){
      var t=localStorage.getItem('theme');
      var preferLight=window.matchMedia('(prefers-color-scheme:light)').matches;
      var theme=(t==='dark'||t==='light')?t:(preferLight?'light':'dark');
      document.documentElement.classList.remove('dark','light');
      document.documentElement.classList.add(theme);
      var l=localStorage.getItem('lang')||((navigator.language||'en').toLowerCase().startsWith('es')?'es':'en');
      document.documentElement.setAttribute('lang',l);
      document.documentElement.setAttribute('data-lang',l);
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.title">Message sent · Mario Huarte Nolasco</title>
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16x16.png" />

  <!-- Fonts: self-hosted en main.css -->
  <link rel="preload" href="assets/fonts/manrope-variable.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Tailwind compilado (build via 'npm run build:css') -->
  <link rel="stylesheet" href="assets/css/tailwind.css">

  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="font-body bg-surface text-on-surface min-h-screen flex items-center justify-center px-6">

  <main class="max-w-xl w-full text-center">
    <div class="mb-8">
      <span class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-primary/10 border-2 border-primary mb-6">
        <svg class="w-10 h-10 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </span>
    </div>

    <h1 class="font-headline text-3xl md:text-4xl font-extrabold tracking-tight mb-4" data-i18n="success.title">
      Thanks for reaching out!
    </h1>
    <p class="text-on-surface-variant text-base mb-10 leading-relaxed" data-i18n="success.body">
      Your message was delivered successfully. I will get back to you within 2 business days.
    </p>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/index.html#contact"
         class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-primary text-on-primary font-label font-bold uppercase tracking-wide text-sm rounded transition-all hover:bg-primary/90 hover:shadow-[0_0_24px_rgba(76,214,251,0.25)]"
         data-i18n="success.cta1">
        Return to contact
      </a>
      <a href="/"
         class="inline-flex items-center justify-center gap-2 px-6 py-3 border border-outline-variant text-on-surface font-label font-bold uppercase tracking-wide text-sm rounded transition-colors hover:border-primary hover:text-primary"
         data-i18n="success.cta2">
        Back to portfolio
      </a>
    </div>

    <!-- Toggle idioma sutil -->
    <button onclick="toggleLang()" class="mt-12 text-xs text-on-surface-variant hover:text-primary uppercase tracking-widest font-label transition-colors">
      <span id="lang-toggle">Español</span>
    </button>
  </main>

<script>
  const I18N = {
    en: {
      "meta.title": "Message sent · Mario Huarte Nolasco",
      "success.title": "Thanks for reaching out!",
      "success.body": "Your message was delivered successfully. I will get back to you within 2 business days.",
      "success.cta1": "Return to contact",
      "success.cta2": "Back to portfolio"
    },
    es: {
      "meta.title": "Mensaje enviado · Mario Huarte Nolasco",
      "success.title": "¡Gracias por escribir!",
      "success.body": "Tu mensaje se envió correctamente. Te responderé en máximo 2 días hábiles.",
      "success.cta1": "Volver al contacto",
      "success.cta2": "Volver al portafolio"
    }
  };
  function applyI18n(lang) {
    const dict = I18N[lang] || I18N.en;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key] != null) {
        if (el.tagName === 'TITLE') document.title = dict[key];
        else el.textContent = dict[key];
      }
    });
    document.getElementById('lang-toggle').textContent = lang === 'es' ? 'English' : 'Español';
  }
  function toggleLang() {
    const cur = document.documentElement.getAttribute('data-lang') || 'en';
    const next = cur === 'es' ? 'en' : 'es';
    localStorage.setItem('lang', next);
    document.documentElement.setAttribute('lang', next);
    document.documentElement.setAttribute('data-lang', next);
    applyI18n(next);
  }
  applyI18n(document.documentElement.getAttribute('data-lang') || 'en');
</script>

</body>
</html>
