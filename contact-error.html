<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <!-- FOUC prevention -->
  <script>
    (function(){
      var t=localStorage.getItem('theme');
      var preferLight=window.matchMedia('(prefers-color-scheme:light)').matches;
      var theme=(t==='dark'||t==='light')?t:(preferLight?'light':'dark');
      document.documentElement.classList.remove('dark','light');
      document.documentElement.classList.add(theme);
      var l=localStorage.getItem('lang')||((navigator.language||'en').toLowerCase().startsWith('es')?'es':'en');
      document.documentElement.setAttribute('lang',l);
      document.documentElement.setAttribute('data-lang',l);
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.title">Message delivery issue · Mario Huarte Nolasco</title>
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16x16.png" />

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'surface':                   'var(--surface)',
            'surface-container':         'var(--surface-container)',
            'surface-container-high':    'var(--surface-container-high)',
            'on-surface':                'var(--on-surface)',
            'on-surface-variant':        'var(--on-surface-variant)',
            'primary':                   'var(--primary)',
            'on-primary':                'var(--on-primary)',
            'outline-variant':           'var(--outline-variant)',
            'error':                     'var(--error)',
          },
          fontFamily: {
            headline: ['Manrope', 'sans-serif'],
            body:     ['Inter', 'sans-serif'],
            label:    ['Space Grotesk', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="font-body bg-surface text-on-surface min-h-screen flex items-center justify-center px-6">

  <main class="max-w-xl w-full text-center">
    <div class="mb-8">
      <span class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-error/10 border-2 border-error mb-6">
        <svg class="w-10 h-10 text-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="8" x2="12" y2="13"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </span>
    </div>

    <h1 class="font-headline text-3xl md:text-4xl font-extrabold tracking-tight mb-4" data-i18n="error.title">
      Couldn't send your message
    </h1>
    <p class="text-on-surface-variant text-base mb-3 leading-relaxed" data-i18n="error.body">
      Something went wrong while processing the form. You can try again or write directly to:
    </p>
    <a href="mailto:mario_huarte@outlook.com" class="inline-block text-primary font-label font-bold mb-10 hover:underline">
      mario_huarte@outlook.com
    </a>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/index.html#contact"
         class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-primary text-on-primary font-label font-bold uppercase tracking-wide text-sm rounded transition-all hover:bg-primary/90 hover:shadow-[0_0_24px_rgba(76,214,251,0.25)]"
         data-i18n="error.cta1">
        Try again
      </a>
      <a href="/"
         class="inline-flex items-center justify-center gap-2 px-6 py-3 border border-outline-variant text-on-surface font-label font-bold uppercase tracking-wide text-sm rounded transition-colors hover:border-primary hover:text-primary"
         data-i18n="error.cta2">
        Back to portfolio
      </a>
    </div>

    <button onclick="toggleLang()" class="mt-12 text-xs text-on-surface-variant hover:text-primary uppercase tracking-widest font-label transition-colors">
      <span id="lang-toggle">Español</span>
    </button>
  </main>

<script>
  const I18N = {
    en: {
      "meta.title": "Message delivery issue · Mario Huarte Nolasco",
      "error.title": "Couldn't send your message",
      "error.body": "Something went wrong while processing the form. You can try again or write directly to:",
      "error.cta1": "Try again",
      "error.cta2": "Back to portfolio"
    },
    es: {
      "meta.title": "Error al enviar · Mario Huarte Nolasco",
      "error.title": "No se pudo enviar tu mensaje",
      "error.body": "Algo salió mal al procesar el formulario. Puedes intentar de nuevo o escribir directamente a:",
      "error.cta1": "Intentar de nuevo",
      "error.cta2": "Volver al portafolio"
    }
  };
  function applyI18n(lang) {
    const dict = I18N[lang] || I18N.en;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key] != null) {
        if (el.tagName === 'TITLE') document.title = dict[key];
        else el.textContent = dict[key];
      }
    });
    document.getElementById('lang-toggle').textContent = lang === 'es' ? 'English' : 'Español';
  }
  function toggleLang() {
    const cur = document.documentElement.getAttribute('data-lang') || 'en';
    const next = cur === 'es' ? 'en' : 'es';
    localStorage.setItem('lang', next);
    document.documentElement.setAttribute('lang', next);
    document.documentElement.setAttribute('data-lang', next);
    applyI18n(next);
  }
  applyI18n(document.documentElement.getAttribute('data-lang') || 'en');
</script>

</body>
</html>
